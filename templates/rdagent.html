<!DOCTYPE html>
<html lang="zh-cn">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>quantinvest · RD-Agent 因子</title>
<link rel="stylesheet" href="/static/style.css"/>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<style>
.factor-chips { display:flex; flex-wrap:wrap; gap:6px; margin:6px 0 4px; }
.factor-chips span { background:#0f172a; border:1px solid #475569; color:#7dd3fc;
  border-radius:10px; padding:2px 9px; font-size:12px; font-family:monospace; }
.report-box { white-space:pre-wrap; font-size:11px; color:#94a3b8; background:#0f172a;
  border:1px solid #334155; border-radius:4px; padding:8px; max-height:170px; overflow:auto; margin-top:6px; }
</style>
</head>
<body>
<header class="screen-header">
  <h1>🔬 quantinvest</h1>
  <nav class="topnav">
    <a href="/">K线浏览</a>
    <a href="/screen">选股</a>
    <a href="/pattern">杯柄形态</a>
    <a href="/predict">下一日预测</a>
    <a href="/rdagent" class="active">RD-Agent因子</a>
  </nav>
  <div class="meta" id="meta">RD-Agent 挖掘的有效因子 + 据此预测的下一交易日买入清单 (仅研究参考)</div>
</header>

<div class="screen-layout">
  <aside class="screen-side">
    <div class="screen-criteria">
      <h3>🔬 RD-Agent</h3>
      <div class="c-row" id="rd-info">加载中...</div>
      <label style="display:block;margin-top:8px;color:#cbd5e1;font-size:12px;">因子批次:
        <select id="batch-sel" style="width:100%;margin-top:3px;"></select>
      </label>
      <button id="btn-fast" style="margin-top:8px;">⚡ 快速预测 (用所选批次)</button>
      <div style="margin-top:10px;border-top:1px solid #334155;padding-top:8px;">
        <label style="color:#cbd5e1;font-size:12px;">挖掘轮数:
          <input id="mine-loops" type="number" min="1" max="50" value="5" style="width:54px;"/>
        </label>
        <button id="btn-mine" style="margin-top:6px;width:100%;">🔬 重新挖掘因子 (慢·需Docker)</button>
      </div>
      <div id="rd-stat" class="hit-stat"></div>
      <div style="color:#cbd5e1;font-size:12px;margin-top:6px;">有效因子 (<span id="nf">0</span>):</div>
      <div class="factor-chips" id="factor-chips"></div>
      <details>
        <summary style="color:#94a3b8;font-size:12px;cursor:pointer;">📄 当日报告</summary>
        <div class="report-box" id="report"></div>
      </details>
      <div style="margin-top:10px;border-top:1px solid #334155;padding-top:8px;">
        <h3 style="margin:0 0 4px;">🧪 模型实验室</h3>
        <div style="font-size:11px;color:#94a3b8;margin-bottom:4px;">在所选批次上训练+回测各模型，结果对比</div>
        <div id="model-btns" style="display:flex;flex-wrap:wrap;gap:4px;"></div>
        <table id="model-table" style="width:100%;margin-top:8px;font-size:11px;border-collapse:collapse;">
          <thead><tr style="color:#cbd5e1;text-align:right;">
            <th style="text-align:left;">模型</th><th>RankIC</th><th>超额</th><th>IR</th><th>回撤</th><th></th></tr></thead>
          <tbody id="model-tbody"></tbody>
        </table>
        <div style="margin-top:6px;">
          <button id="btn-predict-sel" disabled style="width:100%;">📈 用选定模型预测下一交易日</button>
          <button id="btn-cmp" style="width:100%;margin-top:4px;">📊 对比各模型买入清单</button>
        </div>
      </div>
    </div>
    <div class="screen-results">
      <table id="result-table">
        <thead id="result-thead"></thead>
        <tbody id="result-tbody"></tbody>
      </table>
    </div>
  </aside>

  <main class="screen-main">
    <div id="cmp-panel" style="display:none;background:#0f172a;border:1px solid #334155;border-radius:4px;padding:8px;margin-bottom:8px;">
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <b style="color:#e2e8f0;">📊 买入清单对比 <span style="color:#64748b;font-size:11px;">(同一票在多个清单出现→高亮)</span></b>
        <button id="cmp-close" style="font-size:11px;">✕ 关闭</button>
      </div>
      <div id="cmp-picker" style="display:flex;flex-wrap:wrap;gap:8px;margin:6px 0;font-size:12px;"></div>
      <div id="cmp-cols" style="display:flex;gap:8px;overflow-x:auto;"></div>
    </div>
    <div class="mini-controls">
      <label class="ctrl-group">复权:
        <select id="mini-adjust">
          <option value="qfq" selected>前复权</option>
          <option value="hfq">后复权</option>
          <option value="none">不复权</option>
        </select>
      </label>
    </div>
    <div class="kline-mini-header" id="kline-mini-header">点击左侧某只股票, 在这里看 K 线</div>
    <div id="chart-mini"></div>
    <div class="hint">↑/↓ 在结果表里切换股票</div>
  </main>
</div>

<script>
const $info = document.getElementById("rd-info");
const $nf = document.getElementById("nf");
const $chips = document.getElementById("factor-chips");
const $report = document.getElementById("report");
const $thead = document.getElementById("result-thead");
const $tbody = document.getElementById("result-tbody");
const $miniHeader = document.getElementById("kline-mini-header");
const $miniAdjust = document.getElementById("mini-adjust");
const chart = echarts.init(document.getElementById("chart-mini"));
window.addEventListener("resize", () => chart.resize());
if (window.ResizeObserver) new ResizeObserver(() => chart.resize()).observe(document.getElementById("chart-mini"));

let results = [], selectedIdx = -1, pollTimer = null, lastGen = "";
const $btnFast = document.getElementById("btn-fast");
const $btnMine = document.getElementById("btn-mine");
const $mineLoops = document.getElementById("mine-loops");
const $batchSel = document.getElementById("batch-sel");
const $rdStat = document.getElementById("rd-stat");
const $modelBtns = document.getElementById("model-btns");
const $modelTbody = document.getElementById("model-tbody");
const $btnPredictSel = document.getElementById("btn-predict-sel");
const MODEL_LIST = ["lgb","xgb","catboost","ols","ridge","lasso"];
const MODEL_LABEL = {lgb:"LGB",xgb:"XGB",catboost:"CatBoost",ols:"OLS",ridge:"Ridge",lasso:"Lasso"};
let batchData = { batches: [], default_factors: [], default_n: 0 };
let modelResults = [], selectedModel = null;
function setBtns(disabled) {
  $btnFast.disabled = disabled; $btnMine.disabled = disabled;
  $btnPredictSel.disabled = disabled || !selectedModel;
  document.querySelectorAll('#model-btns button').forEach(b => b.disabled = disabled);
}
$miniAdjust.addEventListener("change", () => { if (selectedIdx >= 0) loadMiniKline(results[selectedIdx]); });
$btnFast.addEventListener("click", () => runRefresh(false));
$btnMine.addEventListener("click", runMine);
$batchSel.addEventListener("change", () => { showBatchFactors(); selectedModel = null; $btnPredictSel.disabled = true; renderModelTable(); });

// ---- 模型实验室 ----
MODEL_LIST.forEach(mk => {
  const b = document.createElement("button");
  b.textContent = MODEL_LABEL[mk]; b.style.cssText = "font-size:11px;padding:2px 6px;";
  b.title = MODEL_LABEL[mk] + "：训练 + 回测，结果进下表";
  b.addEventListener("click", () => runModelEval(mk));
  $modelBtns.appendChild(b);
});
$btnPredictSel.addEventListener("click", () => { if (selectedModel) runRefresh(false, selectedModel); });

async function runModelEval(mk) {
  setBtns(true);
  $rdStat.textContent = `启动 ${MODEL_LABEL[mk]} 训练+回测...`;
  try {
    const j = await (await fetch(`/api/rdagent/model_eval?model=${mk}&batch=${encodeURIComponent($batchSel.value)}`)).json();
    $rdStat.textContent = j.message || "";
    setTimeout(load, 1500);
  } catch (e) { $rdStat.innerHTML = `<span class="warn">⚠️ ${e.message}</span>`; setBtns(false); }
}
async function loadModelResults() {
  try { const j = await (await fetch("/api/rdagent/model_results")).json(); modelResults = j.results || []; }
  catch (e) { modelResults = []; }
  renderModelTable();
}
function renderModelTable() {
  const b = $batchSel.value || "default";
  const rows = modelResults.filter(r => r.batch === b).sort((a, c) => c.excess - a.excess);
  const best = rows.length ? rows[0].model : null;
  $modelTbody.innerHTML = "";
  if (!rows.length) { $modelTbody.innerHTML = `<tr><td colspan="6" style="color:#64748b;">该批次暂无结果，点上面按钮跑一个模型</td></tr>`; selectedModel = null; $btnPredictSel.disabled = true; $btnPredictSel.textContent = "📈 用选定模型预测下一交易日"; return; }
  // 默认选中最优模型, 让预测按钮可用 (用户点别的行可改选)
  if (!selectedModel || !rows.some(r => r.model === selectedModel)) {
    selectedModel = best;
    $btnPredictSel.disabled = false;
    $btnPredictSel.textContent = `📈 用 ${MODEL_LABEL[best]} 预测下一交易日`;
  }
  rows.forEach(r => {
    const tr = document.createElement("tr");
    tr.style.cssText = "text-align:right;cursor:pointer;" + (r.model === selectedModel ? "background:#1e3a5f;" : "");
    tr.innerHTML =
      `<td style="text-align:left;">${MODEL_LABEL[r.model] || r.model}${r.model === best ? " ★" : ""}</td>` +
      `<td>${r.rank_ic.toFixed(4)}</td>` +
      `<td style="color:${r.excess >= 0 ? '#22c55e' : '#ef4444'}">${(r.excess * 100).toFixed(1)}%${r.n_seeds > 1 ? '*' : ''}</td>` +
      `<td>${r.ir.toFixed(2)}</td>` +
      `<td style="color:#f59e0b">${(r.maxdd * 100).toFixed(1)}%</td>` +
      `<td>${r.model === best ? '✓' : ''}</td>`;
    tr.title = r.n_seeds > 1 ? `${r.n_seeds}个种子均值, 区间[${(r.excess_lo*100).toFixed(1)},${(r.excess_hi*100).toFixed(1)}]%` : "确定性单次";
    tr.addEventListener("click", () => {
      selectedModel = r.model; renderModelTable();
      $btnPredictSel.disabled = false; $btnPredictSel.textContent = `📈 用 ${MODEL_LABEL[r.model]} 预测下一交易日`;
    });
    $modelTbody.appendChild(tr);
  });
}

// ---- 买入清单对比 ----
const $btnCmp = document.getElementById("btn-cmp");
const $cmpPanel = document.getElementById("cmp-panel");
const $cmpPicker = document.getElementById("cmp-picker");
const $cmpCols = document.getElementById("cmp-cols");
document.getElementById("cmp-close").addEventListener("click", () => { $cmpPanel.style.display = "none"; });
let buylistsIndex = [], cmpData = {}, cmpChecked = new Set();
$btnCmp.addEventListener("click", openCmp);

async function openCmp() {
  $cmpPanel.style.display = "block";
  cmpData = {};
  try { const j = await (await fetch("/api/rdagent/buylists")).json(); buylistsIndex = j.buylists || []; }
  catch (e) { buylistsIndex = []; }
  const b = $batchSel.value || "default";
  const avail = buylistsIndex.filter(x => x.batch === b);
  cmpChecked = new Set(avail.map(x => x.tag));
  renderCmpPicker(avail);
  await renderCmpCols();
}
function renderCmpPicker(avail) {
  if (!avail.length) {
    $cmpPicker.innerHTML = `<span style="color:#64748b;">当前批次还没有买入清单。先在左侧选模型 → 点"📈 用XX预测下一交易日"生成（每个模型各生成一份）。</span>`;
    $cmpCols.innerHTML = ""; return;
  }
  $cmpPicker.innerHTML = avail.map(x =>
    `<label style="color:#cbd5e1;"><input type="checkbox" data-tag="${x.tag}" ${cmpChecked.has(x.tag) ? 'checked' : ''}/> ${MODEL_LABEL[x.model] || x.model} <span style="color:#64748b">(${x.n_hits}只·${x.as_of || ''})</span></label>`).join("");
  $cmpPicker.querySelectorAll("input").forEach(cb => cb.addEventListener("change", () => {
    if (cb.checked) cmpChecked.add(cb.dataset.tag); else cmpChecked.delete(cb.dataset.tag);
    renderCmpCols();
  }));
}
async function renderCmpCols() {
  const tags = [...cmpChecked];
  for (const t of tags) if (!cmpData[t]) {
    try { cmpData[t] = await (await fetch(`/api/rdagent/buylist?tag=${encodeURIComponent(t)}`)).json(); }
    catch (e) { cmpData[t] = { hits: [] }; }
  }
  const cnt = {};
  tags.forEach(t => (cmpData[t].hits || []).forEach(h => { cnt[h.code] = (cnt[h.code] || 0) + 1; }));
  $cmpCols.innerHTML = "";
  if (!tags.length) { $cmpCols.innerHTML = `<span style="color:#64748b;">勾选上面的模型来对比</span>`; return; }
  tags.forEach(t => {
    const d = cmpData[t]; const model = d.model || t.split("__")[1];
    const col = document.createElement("div");
    col.style.cssText = "min-width:155px;flex:1;";
    const rows = (d.hits || []).slice(0, 30).map(h => {
      const shared = cnt[h.code] >= 2;
      return `<div style="font-size:11px;padding:1px 3px;white-space:nowrap;${shared ? 'background:#14532d;color:#bbf7d0;' : 'color:#cbd5e1;'}">${h.rank || ''}. ${h.code} ${h.name || ''}</div>`;
    }).join("");
    col.innerHTML = `<div style="font-weight:bold;color:#7dd3fc;border-bottom:1px solid #334155;margin-bottom:3px;">${MODEL_LABEL[model] || model} <span style="color:#64748b;font-size:10px;">${(d.hits || []).length}只</span></div>${rows}`;
    $cmpCols.appendChild(col);
  });
}

async function runMine() {
  const n = parseInt($mineLoops.value) || 5;
  if (!confirm(`确定开始 RD-Agent 因子挖掘？\n轮数 loop_n=${n}，预计几小时、消耗 LLM 费用，且需要 PC 上 Docker 已启动。\n挖掘会生成一个新因子批次（不改变当前默认）。`)) return;
  setBtns(true);
  $rdStat.textContent = "启动挖掘中...";
  try {
    const j = await (await fetch("/api/rdagent/mine?loop_n=" + n)).json();
    $rdStat.textContent = j.message || "";
    setTimeout(load, 1500);
  } catch (e) { $rdStat.innerHTML = `<span class="warn">⚠️ ${e.message}</span>`; setBtns(false); }
}

async function loadBatches() {
  try { batchData = await (await fetch("/api/rdagent/batches")).json(); }
  catch (e) { batchData = { batches: [], default_factors: [], default_n: 0 }; }
  const opts = [`<option value="">默认 (最新, ${batchData.default_n||0} 因子)</option>`]
    .concat((batchData.batches||[]).map(b => `<option value="${b.label}">${b.label} (${b.n_factors} 因子)</option>`));
  $batchSel.innerHTML = opts.join("");
}
// 左侧 chips 跟随下拉所选批次展示其有效因子
function showBatchFactors() {
  const v = $batchSel.value;
  let factors = batchData.default_factors || [];
  if (v) { const b = (batchData.batches||[]).find(x => x.label === v); if (b) factors = b.factors; }
  $nf.textContent = factors.length;
  $chips.innerHTML = factors.map(f => `<span>${f}</span>`).join("");
}

async function runRefresh(retrain, model) {
  setBtns(true);
  $rdStat.textContent = "启动中...";
  try {
    let url = `/api/rdagent/request?retrain=${retrain?1:0}&batch=${encodeURIComponent($batchSel.value)}`;
    if (model) url += `&model=${encodeURIComponent(model)}`;
    const j = await (await fetch(url)).json();
    $rdStat.textContent = j.message || "";
    setTimeout(load, 1500);
  } catch (e) { $rdStat.innerHTML = `<span class="warn">⚠️ ${e.message}</span>`; setBtns(false); }
}

async function load() {
  try {
    const j = await (await fetch("/api/rdagent")).json();
    const st = j.rd_status || null;
    const busy = j.rd_pending || (st && st.state === "running");
    if (busy) {
      $rdStat.innerHTML = `<span class="warn">⏳ ${st && st.state === "running" ? ("PC 处理中: " + (st.msg || "RD-Agent")) : "已提交, 等待 PC 开始..."}</span>`;
      setBtns(true);
      if (!pollTimer) pollTimer = setInterval(load, 8000);
    } else {
      setBtns(false);
      if (pollTimer) { clearInterval(pollTimer); pollTimer = null; loadModelResults(); }
      if (st) { const m = {idle:"",done:"上次已完成",error:"RD-Agent 出错: "+(st.msg||"")}; if (m[st.state]) $rdStat.textContent = m[st.state]; }
    }
    if (j.generated_at !== undefined && j.generated_at !== lastGen) lastGen = j.generated_at;
    if ((!j.hits || !j.hits.length) && j.message) { $info.innerHTML = `<span class="warn">${j.message}</span>`; return; }
    $info.innerHTML = `基于 <b>${j.as_of || "?"}</b> 数据 · 预测下一交易日<br><span style="color:#64748b">${j.source || ""}</span>`;
    showBatchFactors();   // chips 跟随所选因子批次
    $report.textContent = j.report || "(无报告)";
    results = j.hits || [];
    renderTable();
    if (results.length && selectedIdx < 0) selectRow(0);
  } catch (e) { $info.innerHTML = `<span class="warn">⚠️ ${e.message}</span>`; }
}

function renderTable() {
  $thead.innerHTML = `<tr><th>#</th><th>代码</th><th>名称</th><th>行业</th>
    <th title="模型分">分</th><th>现价</th><th title="建议配资(元)">配资</th></tr>`;
  $tbody.innerHTML = "";
  results.forEach((h, i) => {
    const row = document.createElement("tr");
    row.dataset.idx = i;
    const alloc = h.alloc_yuan ? (h.alloc_yuan >= 10000 ? (h.alloc_yuan/10000).toFixed(1)+"万" : h.alloc_yuan) : "—";
    row.innerHTML = `<td>${h.rank ?? i+1}</td>
      <td class="code">${h.code}</td><td>${h.name||""}</td>
      <td class="industry">${h.industry||""}</td>
      <td class="num roe">${h.score?.toFixed ? h.score.toFixed(3) : h.score}</td>
      <td class="num">${h.close==null?"—":h.close.toFixed(2)}</td>
      <td class="num">${alloc}</td>`;
    row.addEventListener("click", () => selectRow(i));
    $tbody.appendChild(row);
  });
}

function selectRow(i) {
  if (i < 0 || i >= results.length) return;
  const prev = $tbody.querySelector("tr.selected"); if (prev) prev.classList.remove("selected");
  const row = $tbody.querySelector(`tr[data-idx="${i}"]`);
  if (row) { row.classList.add("selected"); row.scrollIntoView({ block: "nearest", behavior: "smooth" }); }
  selectedIdx = i; loadMiniKline(results[i]);
}

async function loadMiniKline(hit) {
  $miniHeader.textContent = `${hit.name} · ${hit.code}  (加载中...)`;
  try {
    const adjust = $miniAdjust.value;
    const r = await fetch(`/api/kline?code=${hit.code}&days=0&adjust=${adjust}&refresh=0`);
    if (!r.ok) { const j = await r.json().catch(()=>({})); throw new Error(j.error||("HTTP "+r.status)); }
    const d = await r.json();
    drawMini(d);
    const al = {qfq:"前复权",hfq:"后复权",none:"不复权"}[d.adjust]||d.adjust;
    $miniHeader.textContent = `${hit.name} · ${hit.code} · ${hit.industry||""} · ${al} · 模型分 ${hit.score}`;
  } catch (e) { $miniHeader.textContent = "K 线加载失败: " + e.message; }
}

function drawMini(d) {
  const kdata = d.dates.map((_, i) => [d.open[i], d.close[i], d.low[i], d.high[i]]);
  const up="#ef4444", down="#22c55e";
  chart.setOption({
    animation:false, tooltip:{trigger:"axis",axisPointer:{type:"cross"}},
    legend:{data:["K线","MA5","MA10","MA20","MA60"],top:0},
    grid:[{left:50,right:15,top:30,height:"58%"},{left:50,right:15,top:"72%",height:"18%"}],
    xAxis:[{type:"category",data:d.dates,scale:true,boundaryGap:false,axisLine:{onZero:false},splitLine:{show:false},axisLabel:{show:false}},
      {type:"category",gridIndex:1,data:d.dates,scale:true,boundaryGap:false,axisLine:{onZero:false},axisTick:{show:false},splitLine:{show:false},axisLabel:{fontSize:10}}],
    yAxis:[{scale:true,splitArea:{show:true}},{scale:true,gridIndex:1,splitNumber:2,axisLabel:{show:false},axisLine:{show:false},axisTick:{show:false},splitLine:{show:false}}],
    dataZoom:[{type:"inside",xAxisIndex:[0,1],start:60,end:100},{show:true,xAxisIndex:[0,1],type:"slider",top:"93%",start:60,end:100}],
    series:[{name:"K线",type:"candlestick",data:kdata,itemStyle:{color:up,color0:down,borderColor:up,borderColor0:down}},
      makeMA("MA5",d.close,5),makeMA("MA10",d.close,10),makeMA("MA20",d.close,20),makeMA("MA60",d.close,60),
      {name:"Volume",type:"bar",xAxisIndex:1,yAxisIndex:1,data:d.volume.map((v,i)=>({value:v,itemStyle:{color:d.close[i]>=d.open[i]?up:down}}))}]
  }, true);
}
function makeMA(name,closes,win){const data=closes.map((_,i)=>{if(i<win-1)return"-";let s=0;for(let k=0;k<win;k++)s+=closes[i-k];return +(s/win).toFixed(3);});return{name,type:"line",data,smooth:true,showSymbol:false,lineStyle:{width:1}};}

document.addEventListener("keydown",(e)=>{
  if(!results.length)return;
  const tag=(document.activeElement&&document.activeElement.tagName)||"";
  if(tag==="INPUT"||tag==="SELECT"||tag==="TEXTAREA")return;
  if(e.ctrlKey||e.metaKey||e.altKey)return;
  if(e.key==="ArrowDown"){e.preventDefault();selectRow(Math.min(results.length-1,selectedIdx+1));}
  else if(e.key==="ArrowUp"){e.preventDefault();selectRow(Math.max(0,selectedIdx-1));}
});
loadBatches().then(() => { showBatchFactors(); renderModelTable(); load(); loadModelResults(); });
</script>
</body>
</html>
