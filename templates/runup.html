<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>业绩抢跑 · quantinvest</title>
<link rel="stylesheet" href="/static/style.css"/>
<style>
  .wrap{max-width:1000px;margin:0 auto;padding:16px}
  .hd{font-size:21px;font-weight:700;margin:6px 0 2px}
  .sub{color:#94a3b8;line-height:1.7;margin-bottom:14px;font-size:13px}
  .upd{color:#64748b;font-size:12px}
  .card{background:#0f172a;border:1px solid #1e293b;border-radius:10px;padding:12px 14px;margin-bottom:14px}
  .card h3{margin:0 0 8px;font-size:15px}
  table{border-collapse:collapse;width:100%;font-size:12.5px}
  th,td{border:1px solid #1e293b;padding:5px 9px;text-align:right}
  th:first-child,td:first-child,th:nth-child(2),td:nth-child(2){text-align:left}
  th{background:#111827;color:#94a3b8;font-weight:600}
  .buy h3{color:#34d399} .sell h3{color:#f87171} .watch h3{color:#60a5fa}
  .tag{font-size:11px;padding:1px 7px;border-radius:10px;background:#1e293b;color:#cbd5e1}
  .empty{color:#94a3b8;padding:10px;font-size:13px}
  .note{background:#1a2433;border:1px solid #2a4a6a;border-radius:8px;padding:10px 13px;color:#cbd5e1;font-size:12.5px;line-height:1.7;margin-top:12px}
  .warn{color:#fbbf24}
</style>
</head>
<body>
  <nav class="topnav">
    <a href="/">K线浏览</a><a href="/watchlist">自选股</a><a href="/screen">选股</a><a href="/pattern">杯柄形态</a>
    <a href="/rdagent">RD-Agent因子</a><a href="/alphagen">AlphaGen挖掘</a><a href="/rdquant">RD-Agent-Quant</a><a href="/backtest">回测对比</a><a href="/strategy">单票策略</a>
    <a href="/advisor">策略顾问</a><a href="/advisor-pro">策略顾问Pro</a><a href="/portfolio">组合配置</a><a href="/trade">下单执行</a><a href="/track">实盘跟踪</a>
    <a href="/research">研究台</a><a href="/runup" class="active">业绩抢跑</a><a href="/repo">回购腿</a><a href="/ipo">打新</a><a href="/chipmap">海力士映射</a><a href="/rsrs">RSRS择时</a><a href="/intraday">日内择时</a><a href="/tradingagents">TradingAgents分析</a>
  </nav>
  <details class="usage"><summary>ℹ️ 这个页面怎么用</summary><div>【<span class="k">第二sleeve</span>】业绩预告抢跑。腿A:预增股财报前~6交易日建仓、前1日平;腿B:业绩好公告刚发→开盘买持5日。<span class="w">季节性</span>集中 4/8/10 月披露季,其余空仓;中证1000股指期货(IM)对冲。</div></details>
  <div class="wrap"><div id="content">加载中…</div></div>
<script>
function tbl(rows, cols){
  if(!rows||!rows.length) return '<div class="empty">— 无 —</div>';
  let h="<table><thead><tr>"+cols.map(c=>`<th>${c[0]}</th>`).join("")+"</tr></thead><tbody>";
  h+=rows.map(r=>"<tr>"+cols.map(c=>`<td>${c[1](r)}</td>`).join("")+"</tr>").join("");
  return h+"</tbody></table>";
}
fetch("/api/runup").then(r=>r.json()).then(d=>{
  let h=`<div class="hd">📈 业绩预告抢跑 · 第二sleeve</div><div class="upd">更新 ${d.updated||"-"} · 今日 ${d.today||"-"}</div>`;
  h+=`<div class="sub">${d.strategy||""}</div>`;
  const cols=[["代码",r=>r.code],["名称",r=>r.name],["预告",r=>`<span class="tag">${r.type||""}</span>`],
              ["报告日",r=>r.report_date],["距报告(交易日)",r=>r.days_to]];
  const colsB=[["代码",r=>r.code],["名称",r=>r.name],["预告",r=>`<span class="tag">${r.type||""}</span>`],
               ["公告日",r=>r.ann_date],["计划卖出日",r=>r.sell_date]];
  const nbuy=(d.buy||[]).length, nsell=(d.sell||[]).length, nwatch=(d.watch||[]).length, npost=(d.buy_post||[]).length;
  if(nbuy+nsell+nwatch+npost===0){
    h+=`<div class="card"><div class="empty">当前无业绩事件(财报淡季)。<br>该策略季节性集中在 <b>4月(年报+一季报)/ 8月(中报)/ 10月(三季报)</b> 披露季;其余时段空仓。</div></div>`;
  }else{
    h+=`<div class="card"><div style="color:#cbd5e1;font-size:13px;font-weight:600;margin-bottom:6px">腿A · 公告前抢跑(报告前6日建仓→前1日平)</div>`;
    h+=`<div class="buy"><h3>🟢 今日建仓 (${nbuy}只)</h3>${tbl(d.buy,cols)}</div>`;
    h+=`<div class="sell" style="margin-top:8px"><h3>🔴 平仓·报告前1日 (${nsell}只)</h3>${tbl(d.sell,cols)}</div></div>`;
    h+=`<div class="card"><div style="color:#cbd5e1;font-size:13px;font-weight:600;margin-bottom:6px">腿B · 公告后漂移(业绩好公告刚发→开盘买·持5交易日)</div>`;
    h+=`<div class="buy"><h3>🟢 今日建仓 (${npost}只)</h3>${tbl(d.buy_post,colsB)}</div></div>`;
    h+=`<div class="card watch"><h3>🔵 观察 (预增·报告还早 · ${nwatch}只)</h3>${tbl((d.watch||[]).slice(0,40),cols)}</div>`;
  }
  if(d.note) h+=`<div class="note"><span class="warn">⚠️ </span>${d.note}</div>`;
  document.getElementById("content").innerHTML=h;
}).catch(e=>{document.getElementById("content").innerHTML=`加载失败: ${e}`;});
</script>
</body>
</html>
