<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>海力士映射 · quantinvest</title>
<link rel="stylesheet" href="/static/style.css"/>
<style>
  .wrap{max-width:1000px;margin:0 auto;padding:16px}
  .hd{font-size:21px;font-weight:700;margin:6px 0 2px}
  .sub{color:#94a3b8;line-height:1.7;margin-bottom:14px;font-size:13px}
  .upd{color:#64748b;font-size:12px}
  .card{background:#0f172a;border:1px solid #1e293b;border-radius:10px;padding:14px 16px;margin-bottom:14px}
  .sig{font-size:30px;font-weight:800;margin:6px 0}
  .fire{color:#34d399} .wait{color:#94a3b8}
  .hx{font-size:16px}
  table{border-collapse:collapse;width:100%;font-size:12.5px;margin-top:6px}
  th,td{border:1px solid #1e293b;padding:5px 9px;text-align:right}
  th:first-child,td:first-child{text-align:left}
  th{background:#111827;color:#94a3b8;font-weight:600}
  .mem{color:#fbbf24} .board{font-size:11px;padding:1px 6px;border-radius:8px;background:#1e293b;color:#cbd5e1}
  .note{background:#1a2433;border:1px solid #2a4a6a;border-radius:8px;padding:10px 13px;color:#cbd5e1;font-size:12.5px;line-height:1.7;margin-top:12px}
  .warn{color:#fbbf24}
</style>
</head>
<body>
  <nav class="topnav">
    <a href="/">K线浏览</a><a href="/watchlist">自选股</a><a href="/screen">选股</a><a href="/pattern">杯柄形态</a>
    <a href="/rdagent">RD-Agent因子</a><a href="/alphagen">AlphaGen挖掘</a><a href="/rdquant">RD-Agent-Quant</a><a href="/backtest">回测对比</a><a href="/strategy">单票策略</a>
    <a href="/advisor-pro">策略顾问Pro</a><a href="/portfolio">组合配置</a><a href="/trade">下单执行</a><a href="/track">实盘跟踪</a>
    <a href="/research">研究台</a><a href="/runup">业绩抢跑</a><a href="/repo">回购腿</a><a href="/ipo">打新</a><a href="/chipmap" class="active">海力士映射</a><a href="/rsrs">RSRS择时</a><a href="/tradingagents">TA分析</a>
  </nav>
  <details class="usage"><summary>ℹ️ 这个页面怎么用</summary><div>【小卫星信号】SK海力士(纯存储)当日收涨>2% → A股半导体当日<b>尾盘(15:00前)等权买半导体篮子 → 次日收盘卖</b>(持1天)。海力士14:30收盘可知,A股15:00还能买。回测超基准~+0.3%/次、夏2-3、22-25年OOS全正(⚠️26年小样本转负,盯衰减)。三星(综合体)无效,只看海力士。半导体单边集中,仅<b>小仓</b>。</div></details>
  <div class="wrap"><div id="content">加载中…</div></div>
<script>
fetch("/api/chipmap").then(r=>r.json()).then(d=>{
  let h=`<div class="hd">🇰🇷→🇨🇳 海力士映射信号</div><div class="upd">更新 ${d.updated||"-"}</div><div class="sub">${d.strategy||""}</div>`;
  const fire=(d.signal||"").includes("买");
  h+=`<div class="card" style="text-align:center">
      <div class="hx">SK海力士(000660.KS) ${d.hynix_date||"-"}: <b style="color:${(d.hynix_ret||0)>=0?'#34d399':'#f87171'}">${d.hynix_ret!=null?((d.hynix_ret*100).toFixed(2)+'%'):'-'}</b> (阈值>${((d.threshold||0.02)*100).toFixed(0)}%)</div>
      <div class="sig ${fire?'fire':'wait'}">${d.signal||"-"}</div>
      <div style="color:#94a3b8;font-size:12px">${fire?'今日A股尾盘等权买下方半导体篮子,次日收盘卖':'海力士未达阈值,今日不操作'}</div></div>`;
  if(d.track&&d.track.length){
    h+=`<div class="card"><b>海力士近期(10日)</b><table><thead><tr><th>日期</th><th>涨跌</th><th>信号</th></tr></thead><tbody>`;
    h+=d.track.slice().reverse().map(t=>`<tr><td>${t.date}</td><td style="color:${t.ret>=0?'#34d399':'#f87171'}">${(t.ret*100).toFixed(2)}%</td><td>${t.signal?'🟢买':'—'}</td></tr>`).join("");
    h+=`</tbody></table></div>`;
  }
  if(d.basket){
    h+=`<div class="card"><b>A股半导体篮子(等权, <span class="mem">黄=存储对标海力士</span>)</b><table><thead><tr><th>代码</th><th>名称</th><th>类</th></tr></thead><tbody>`;
    h+=d.basket.map(b=>`<tr><td>${b.code}</td><td class="${b.mem?'mem':''}">${b.name}</td><td><span class="board">${b.mem?'存储':'半导体'}</span></td></tr>`).join("");
    h+=`</tbody></table></div>`;
  }
  if(d.note) h+=`<div class="note"><span class="warn">⚠️ </span>${d.note}</div>`;
  document.getElementById("content").innerHTML=h;
}).catch(e=>{document.getElementById("content").innerHTML="加载失败: "+e;});
</script>
</body>
</html>
